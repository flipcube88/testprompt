<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Keep | 你的個人 Prompt 庫</title>
    <meta name="theme-color" content="#2563eb">
    <link rel="icon" href="https://api.iconify.design/lucide/copy.svg?color=%232563eb" type="image/svg+xml">
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- UI Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Safeguard for Tailwind initialization
        if (typeof tailwind !== 'undefined') {
            tailwind.config = { 
                darkMode: 'class',
                theme: {
                    extend: {
                        colors: {
                            blue: { 500: '#3b82f6', 600: '#2563eb' }
                        }
                    }
                }
            };
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 新增：PWA 設定，讓網頁可以在手機/電腦上「安裝」成 App -->
    <script>
        const manifest = {
            "name": "Prompt Keep", "short_name": "PromptKeep",
            "start_url": ".", "display": "standalone", "background_color": "#f9fafb", "theme_color": "#2563eb",
            "icons": [
                { "src": "https://api.iconify.design/lucide/copy.svg?color=%232563eb&width=192&height=192", "sizes": "192x192", "type": "image/svg+xml" },
                { "src": "https://api.iconify.design/lucide/copy.svg?color=%232563eb&width=512&height=512", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
        const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob); document.head.appendChild(link);
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        
        .code-preview-fade::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
            background: linear-gradient(to top, inherit, transparent); pointer-events: none;
        }

        /* Markdown Styles */
        .md-content h1 { font-size: 1.4em; font-weight: 700; margin: 0.5em 0; }
        .md-content ul { list-style: disc; padding-left: 1.5em; margin: 0.5em 0; }
        .md-content code.inline-code {
            background: rgba(0,0,0,0.08); border-radius: 4px;
            padding: 0.1em 0.3em; font-family: monospace; font-size: 0.9em;
        }
        .dark .md-content code.inline-code { background: rgba(255,255,255,0.15); }
        
        .tag-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px;
            border-radius: 999px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; border: 1px solid transparent; }
            
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-note { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Firebase Initialization ---
        const firebaseConfig = {
            apiKey: "AIzaSyD6s5zYl7VtTxnqcXPkWccGAB7zug1pgi8",
            authDomain: "testprompt-e4212.firebaseapp.com",
            projectId: "testprompt-e4212",
            storageBucket: "testprompt-e4212.appspot.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const COLORS = [
            { id: 'default', value: '#ffffff', darkValue: '#1f2937' },
            { id: 'red',     value: '#f28b82', darkValue: '#5c2b29' },
            { id: 'orange',  value: '#fbbc04', darkValue: '#614a19' },
            { id: 'yellow',  value: '#fff475', darkValue: '#635d19' },
            { id: 'green',   value: '#ccff90', darkValue: '#345920' },
            { id: 'teal',    value: '#a7ffeb', darkValue: '#16504b' },
            { id: 'blue',    value: '#cbf0f8', darkValue: '#2d555e' },
            { id: 'purple',  value: '#d7aefb', darkValue: '#42275e' },
        ];

        // --- Helper: Icon Component ---
        const Icon = React.memo(({ name, size = 20, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current && lucide.icons[name]) {
                    // 修復：這裡原本漏了塞入 <i> 標籤，導致圖示切換時會消失
                    ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center"></span>;
        });

        // --- Helper: CodeBlock Component ---
        const CodeBlock = React.memo(({ code, language }) => {
            const [copied, setCopied] = useState(false);
            
            const handleCopy = (e) => {
                e.stopPropagation();
                // 使用 textarea 作為 fallback，避免 iframe 權限政策阻擋 clipboard API
                const ta = document.createElement("textarea"); 
                ta.value = code;
                ta.style.cssText = "position:fixed;left:-999999px"; 
                document.body.appendChild(ta);
                ta.focus(); 
                ta.select();
                try { 
                    document.execCommand('copy'); 
                    setCopied(true); 
                } catch(err) {
                    console.error("複製失敗", err);
                }
                document.body.removeChild(ta);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="my-3 bg-gray-800 rounded-lg overflow-hidden text-gray-100 font-mono text-sm shadow-md" onClick={e => e.stopPropagation()}>
                    <div className="bg-gray-900 px-3 py-1.5 flex justify-between items-center border-b border-gray-700">
                        <span className="text-xs text-gray-400 uppercase font-bold tracking-wider">{language || 'code'}</span>
                        <button onClick={handleCopy} className="flex items-center gap-1 text-xs text-gray-300 hover:text-white bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded transition-colors active:scale-95">
                            {copied ? <Icon name="Check" size={14} className="text-green-400" /> : <Icon name="Copy" size={14} />}
                            {copied ? <span className="text-green-400">已複製</span> : <span>複製</span>}
                        </button>
                    </div>
                    <pre className="p-4 overflow-x-auto leading-relaxed"><code>{code}</code></pre>
                </div>
            );
        });

        // --- Helper: CodePreviewBlock Component (For Grid View) ---
        const CodePreviewBlock = React.memo(({ code, language }) => {
            const [copied, setCopied] = useState(false);
            
            const handleCopy = (e) => {
                e.stopPropagation(); // 阻止點擊事件冒泡，避免打開編輯彈窗
                const ta = document.createElement("textarea"); 
                ta.value = code;
                ta.style.cssText = "position:fixed;left:-999999px"; 
                document.body.appendChild(ta);
                ta.focus(); 
                ta.select();
                try { 
                    document.execCommand('copy'); 
                    setCopied(true); 
                } catch(err) {
                    console.error("複製失敗", err);
                }
                document.body.removeChild(ta);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="my-2 inline-flex items-center justify-between bg-black/5 dark:bg-white/10 rounded-lg border border-black/5 dark:border-white/10 pl-3 pr-1 py-1 gap-4 max-w-full">
                    <span className="text-gray-600 dark:text-gray-300 text-xs font-mono font-medium truncate">
                        [代碼塊: {language || 'code'}]
                    </span>
                    <button 
                        onClick={handleCopy} 
                        className="flex items-center gap-1 text-[10px] font-bold text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-white bg-white dark:bg-gray-800 shadow-sm border border-gray-200 dark:border-gray-600 hover:bg-gray-50 dark:hover:bg-gray-700 px-2 py-1 rounded-md transition-all active:scale-95 flex-shrink-0"
                    >
                        {copied ? <Icon name="Check" size={12} className="text-green-500" /> : <Icon name="Copy" size={12} />}
                        {copied ? <span className="text-green-500">已複製</span> : <span>複製</span>}
                    </button>
                </div>
            );
        });

        // --- Helper: Markdown Parser (Simple) ---
        const parseContent = (text, isPreview = false) => {
            if (!text) return null;
            const parts = text.split(/```/);
            return parts.map((part, i) => {
                if (i % 2 !== 0) { // Code block
                    const lines = part.split('\n');
                    const lang = lines[0].trim();
                    const code = lines.slice(1).join('\n').trim();
                    
                    if (isPreview) {
                        return <CodePreviewBlock key={i} code={code} language={lang} />;
                    }
                    return <CodeBlock key={i} code={code} language={lang} />;
                }
                // Basic markdown lines
                return part.split('\n').map((line, j) => {
                    if (line.startsWith('# ')) return <h1 key={`${i}-${j}`}>{line.slice(2)}</h1>;
                    if (line.startsWith('- ')) return <li key={`${i}-${j}`} className="ml-4">{line.slice(2)}</li>;
                    return <p key={`${i}-${j}`} className="min-h-[1em]">{line}</p>;
                });
            });
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [notes, setNotes] = useState([]);
            
            // 修改：讓深色模式記住使用者的選擇，若無設定則跟隨系統
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('prompt_keep_theme');
                if (saved !== null) return saved === 'dark';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });
            
            const [searchQuery, setSearchQuery] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);
            const [authError, setAuthError] = useState('');
            
            const [isComposing, setIsComposing] = useState(false);
            const [composeTitle, setComposeTitle] = useState('');
            const [composeContent, setComposeContent] = useState('');
            const [composeColor, setComposeColor] = useState('#ffffff');

            // --- Modal & Edit States ---
            const [activeNote, setActiveNote] = useState(null);
            const [isEditingModal, setIsEditingModal] = useState(false);
            const [modalTitle, setModalTitle] = useState('');
            const [modalContent, setModalContent] = useState('');
            const [modalColor, setModalColor] = useState('');
            
            // 新增：用於記錄目前正在複製的完整筆記 ID
            const [copiedNoteId, setCopiedNoteId] = useState(null);

            const handleLogin = async () => {
                try {
                    await auth.signInWithPopup(googleProvider);
                } catch (e) {
                    console.error("登入錯誤:", e);
                    if (e.code === 'auth/operation-not-supported-in-this-environment') {
                        try {
                            // 若環境不支援彈出視窗，嘗試使用匿名登入
                            await auth.signInAnonymously();
                        } catch (err) {
                            setAuthError("此預覽環境受限，無法使用登入功能。請直接使用本地模式！");
                            setTimeout(() => setAuthError(''), 4000);
                        }
                    } else {
                        setAuthError("登入發生錯誤：" + e.message);
                        setTimeout(() => setAuthError(''), 4000);
                    }
                }
            };

            useEffect(() => {
                const unsubAuth = auth.onAuthStateChanged(u => {
                    setUser(u);
                    if (!u) {
                        try {
                            const local = localStorage.getItem('prompt_keep_local');
                            if (local) setNotes(JSON.parse(local));
                        } catch (err) {
                            console.warn("無法讀取 LocalStorage", err);
                        }
                    }
                });
                return unsubAuth;
            }, []);

            // 新增：監聽深色模式切換，並同步儲存到 localStorage 及套用 class
            useEffect(() => {
                document.documentElement.classList.toggle('dark', isDarkMode);
                localStorage.setItem('prompt_keep_theme', isDarkMode ? 'dark' : 'light');
            }, [isDarkMode]);

            useEffect(() => {
                if (!user) {
                    try {
                        localStorage.setItem('prompt_keep_local', JSON.stringify(notes));
                    } catch (err) {
                        console.warn("無法寫入 LocalStorage", err);
                    }
                }
            }, [notes, user]);

            const saveNote = async () => {
                if (!composeTitle.trim() && !composeContent.trim()) {
                    setIsComposing(false);
                    return;
                }
                const newNote = {
                    title: composeTitle,
                    content: composeContent,
                    color: composeColor,
                    timestamp: Date.now()
                };
                if (user) {
                    await db.collection('users').doc(user.uid).collection('notes').add(newNote);
                } else {
                    setNotes(prev => [{ id: Date.now().toString(), ...newNote }, ...prev]);
                }
                setComposeTitle(''); setComposeContent(''); setComposeColor('#ffffff');
                setIsComposing(false);
            };

            const saveEditedNote = async () => {
                if (!activeNote) return;
                const updatedData = {
                    title: modalTitle,
                    content: modalContent,
                    color: modalColor,
                    timestamp: Date.now()
                };
                
                if (user) {
                    await db.collection('users').doc(user.uid).collection('notes').doc(activeNote.id).update(updatedData);
                } else {
                    setNotes(prev => prev.map(n => n.id === activeNote.id ? { ...n, ...updatedData } : n));
                }
                
                setActiveNote({ ...activeNote, ...updatedData });
                setIsEditingModal(false);
            };

            const deleteNote = async (id) => {
                if (user) {
                    await db.collection('users').doc(user.uid).collection('notes').doc(id).delete();
                } else {
                    setNotes(prev => prev.filter(n => n.id !== id));
                }
                if (activeNote && activeNote.id === id) setActiveNote(null);
            };
            
            // 新增：一鍵複製整篇筆記內容
            const copyFullNote = (e, id, content) => {
                e.stopPropagation();
                const ta = document.createElement("textarea"); 
                ta.value = content;
                ta.style.cssText = "position:fixed;left:-999999px"; 
                document.body.appendChild(ta);
                ta.focus(); 
                ta.select();
                try { 
                    document.execCommand('copy'); 
                    setCopiedNoteId(id);
                    setTimeout(() => setCopiedNoteId(null), 2000);
                } catch(err) {
                    console.error("複製失敗", err);
                }
                document.body.removeChild(ta);
            };

            const openModal = (note) => {
                setActiveNote(note);
                setModalTitle(note.title || '');
                setModalContent(note.content || '');
                setModalColor(note.color || '#ffffff');
                setIsEditingModal(false);
            };

            const filteredNotes = notes.filter(n => 
                (n.title || '').toLowerCase().includes(searchQuery.toLowerCase()) || 
                (n.content || '').toLowerCase().includes(searchQuery.toLowerCase())
            );

            const getBgColor = (hex) => {
                const c = COLORS.find(c => c.value === hex) || COLORS[0];
                return isDarkMode ? c.darkValue : c.value;
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4 sticky top-0 z-50 shadow-sm flex items-center justify-between">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                <Icon name="Clipboard" size={24} />
                            </div>
                            <h1 className="text-xl font-bold tracking-tight hidden sm:block">Prompt Keep</h1>
                        </div>

                        <div className="flex-1 max-w-xl mx-4">
                            <div className="relative group">
                                <Icon name="Search" className="absolute left-3 top-2.5 text-gray-400 group-focus-within:text-blue-500 transition-colors" size={18} />
                                <input 
                                    type="text" 
                                    placeholder="搜尋 Prompt..."
                                    className="w-full pl-10 pr-4 py-2 rounded-xl bg-gray-100 dark:bg-gray-700 focus:bg-white dark:focus:bg-gray-600 focus:ring-2 ring-blue-500 outline-none transition-all"
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>

                        <div className="flex items-center gap-2 sm:gap-4">
                            {/* 新增：雲端同步狀態提示 (Cloud Save Indicator) */}
                            <div className="text-xs sm:text-sm font-medium flex items-center gap-1.5 cursor-help" title={user ? "資料已自動同步至雲端" : "資料目前僅儲存於本機瀏覽器"}>
                                {user ? (
                                    isSyncing ? (
                                        <span className="text-blue-500 animate-pulse flex items-center gap-1"><Icon name="Cloud" size={16}/><span className="hidden sm:inline">同步中</span></span>
                                    ) : (
                                        <span className="text-green-600 dark:text-green-400 flex items-center gap-1"><Icon name="Cloud" size={16}/><span className="hidden sm:inline">已同步</span></span>
                                    )
                                ) : (
                                    <span className="text-orange-500 flex items-center gap-1"><Icon name="HardDrive" size={16}/><span className="hidden sm:inline">本機儲存</span></span>
                                )}
                            </div>

                            {/* 修改：切換深色模式按鈕，加上顏色 class 避免隱形 */}
                            <button onClick={() => setIsDarkMode(!isDarkMode)} className="text-gray-600 dark:text-gray-300 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition-colors">
                                <Icon name={isDarkMode ? "Sun" : "Moon"} />
                            </button>
                            
                            {user ? (
                                <div className="flex items-center gap-2 pl-2 border-l dark:border-gray-700">
                                    <img src={user.photoURL || 'https://api.iconify.design/lucide/user.svg?color=%239ca3af'} className="w-8 h-8 rounded-full border border-gray-200 bg-gray-100 dark:bg-gray-800" alt="avatar" />
                                    <button onClick={() => auth.signOut()} className="text-xs font-bold text-gray-500 hover:text-red-500 uppercase tracking-wider">登出</button>
                                </div>
                            ) : (
                                <button onClick={handleLogin} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                                    <Icon name="LogIn" size={16} /> 登入
                                </button>
                            )}
                        </div>
                    </header>

                    {/* 登入錯誤提示 */}
                    {authError && (
                        <div className="fixed top-20 right-4 bg-red-600 text-white px-5 py-3 rounded-xl shadow-2xl z-[100] text-sm font-bold animate-note flex items-center gap-2">
                            <Icon name="AlertTriangle" size={18} />
                            {authError}
                        </div>
                    )}

                    <main className="flex-1 p-4 sm:p-8 max-w-7xl mx-auto w-full">
                        {/* Compose Box */}
                        <div className="max-w-2xl mx-auto mb-12">
                            <div 
                                className={`rounded-2xl shadow-md border dark:border-gray-700 transition-all duration-300 overflow-hidden ${isComposing ? 'ring-2 ring-blue-500' : 'hover:shadow-lg'}`}
                                style={{ backgroundColor: getBgColor(composeColor) }}
                            >
                                {!isComposing ? (
                                    <div className="p-4 cursor-text text-gray-500 flex items-center gap-3" onClick={() => setIsComposing(true)}>
                                        <Icon name="PlusCircle" />
                                        <span className="font-medium">寫下新的 Prompt 或代碼片段...</span>
                                    </div>
                                ) : (
                                    <div className="p-4 flex flex-col gap-3">
                                        <input 
                                            autoFocus
                                            type="text" 
                                            placeholder="標題" 
                                            className="bg-transparent text-xl font-bold outline-none placeholder:text-gray-400"
                                            value={composeTitle}
                                            onChange={e => setComposeTitle(e.target.value)}
                                        />
                                        <textarea 
                                            placeholder="內容 (支援 Markdown 及 ``` 代碼塊)"
                                            className="bg-transparent min-h-[120px] outline-none resize-none leading-relaxed"
                                            value={composeContent}
                                            onChange={e => setComposeContent(e.target.value)}
                                        />
                                        <div className="flex items-center justify-between mt-2 pt-4 border-t border-black/5 dark:border-white/5">
                                            <div className="flex gap-1.5">
                                                {COLORS.map(c => (
                                                    <button 
                                                        key={c.id} 
                                                        className={`w-6 h-6 rounded-full border-2 ${composeColor === c.value ? 'border-blue-500 scale-110' : 'border-transparent'}`}
                                                        style={{ backgroundColor: isDarkMode ? c.darkValue : c.value }}
                                                        onClick={() => setComposeColor(c.value)}
                                                    />
                                                ))}
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setIsComposing(false)} className="px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-black/5 dark:hover:bg-white/5">取消</button>
                                                <button onClick={saveNote} className="bg-gray-900 dark:bg-blue-600 text-white px-5 py-1.5 rounded-lg text-sm font-bold shadow-md">儲存</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Notes Grid */}
                        {isSyncing && notes.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-blue-500">
                                <div className="animate-spin mb-4"><Icon name="Loader2" size={40} /></div>
                                <p className="font-bold">雲端同步中...</p>
                            </div>
                        ) : filteredNotes.length === 0 ? (
                            <div className="text-center py-20 opacity-30">
                                <Icon name="Inbox" size={64} className="mx-auto mb-4" />
                                <p className="text-xl font-bold">目前沒有筆記</p>
                            </div>
                        ) : (
                            <div className="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4 space-y-4">
                                {filteredNotes.map(note => (
                                    <div 
                                        key={note.id} 
                                        onClick={() => openModal(note)}
                                        className="break-inside-avoid animate-note p-5 rounded-2xl border dark:border-gray-700 shadow-sm group relative hover:shadow-md transition-shadow cursor-pointer"
                                        style={{ backgroundColor: getBgColor(note.color) }}
                                    >
                                        {/* 新增：一鍵複製整篇筆記按鈕 */}
                                        <button 
                                            onClick={(e) => copyFullNote(e, note.id, note.content)}
                                            className="absolute top-3 right-11 p-1.5 rounded-lg bg-black/5 dark:bg-white/5 opacity-0 group-hover:opacity-100 hover:bg-blue-100 hover:text-blue-600 dark:hover:bg-blue-900/50 dark:hover:text-blue-400 transition-all"
                                            title="複製完整內容"
                                        >
                                            {copiedNoteId === note.id ? <Icon name="Check" size={16} className="text-green-500" /> : <Icon name="Copy" size={16} />}
                                        </button>
                                        {/* 原有的刪除按鈕 */}
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); deleteNote(note.id); }}
                                            className="absolute top-3 right-3 p-1.5 rounded-lg bg-black/5 dark:bg-white/5 opacity-0 group-hover:opacity-100 hover:bg-red-100 hover:text-red-500 transition-all"
                                        >
                                            <Icon name="Trash2" size={16} />
                                        </button>
                                        {note.title && <h3 className="font-bold text-lg mb-2 pr-8">{note.title}</h3>}
                                        <div className="md-content text-sm leading-relaxed whitespace-pre-wrap">
                                            {parseContent(note.content, true)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* --- Note View & Edit Modal --- */}
                    {activeNote && (
                        <div className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 sm:p-6" onClick={() => setActiveNote(null)}>
                            <div 
                                className="w-full max-w-3xl rounded-3xl shadow-2xl flex flex-col max-h-[90vh] border dark:border-gray-700 transition-colors duration-200"
                                style={{ backgroundColor: getBgColor(isEditingModal ? modalColor : activeNote.color) }}
                                onClick={e => e.stopPropagation()}
                            >
                                <div className="p-4 sm:p-5 flex justify-between items-center border-b border-black/5 dark:border-white/5">
                                    <div className="flex gap-2">
                                        {isEditingModal ? (
                                            <button onClick={() => setIsEditingModal(false)} className="px-4 py-2 text-sm font-bold text-gray-600 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 rounded-xl transition-colors">取消編輯</button>
                                        ) : (
                                            <button onClick={() => setIsEditingModal(true)} className="flex items-center gap-2 px-4 py-2 text-sm font-bold bg-white/50 dark:bg-white/10 hover:bg-white/80 dark:hover:bg-white/20 rounded-xl transition-colors border border-black/10 dark:border-white/10 text-gray-800 dark:text-gray-200">
                                                <Icon name="Edit3" size={16} /> 編輯
                                            </button>
                                        )}
                                        <button onClick={() => deleteNote(activeNote.id)} className="flex items-center gap-2 px-4 py-2 text-sm font-bold text-red-600 hover:bg-red-50 dark:text-red-400 dark:hover:bg-red-900/30 rounded-xl transition-colors">
                                            <Icon name="Trash2" size={16} /> <span className="hidden sm:inline">刪除</span>
                                        </button>
                                    </div>
                                    <button onClick={() => setActiveNote(null)} className="p-2 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 rounded-full transition-colors text-gray-600 dark:text-gray-300">
                                        <Icon name="X" size={20} />
                                    </button>
                                </div>
                                
                                <div className="p-6 sm:p-8 overflow-y-auto flex-1 custom-scrollbar">
                                    {isEditingModal ? (
                                        <div className="flex flex-col gap-5 h-full">
                                            <input 
                                                type="text" 
                                                placeholder="標題" 
                                                className="bg-transparent text-3xl font-bold outline-none border-b border-black/10 dark:border-white/10 pb-3 focus:border-blue-500 transition-colors w-full"
                                                value={modalTitle}
                                                onChange={e => setModalTitle(e.target.value)}
                                            />
                                            <textarea 
                                                placeholder="內容 (支援 Markdown 及 ``` 代碼塊)"
                                                className="bg-transparent flex-1 min-h-[300px] outline-none resize-none leading-relaxed w-full text-lg"
                                                value={modalContent}
                                                onChange={e => setModalContent(e.target.value)}
                                            />
                                        </div>
                                    ) : (
                                        <div className="text-gray-800 dark:text-gray-200 h-full">
                                            {activeNote.title && <h2 className="font-bold text-3xl mb-6">{activeNote.title}</h2>}
                                            <div className="text-lg whitespace-pre-wrap leading-relaxed">
                                                {parseContent(activeNote.content, false)}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {isEditingModal && (
                                    <div className="p-5 border-t border-black/5 dark:border-white/5 flex flex-col sm:flex-row gap-4 justify-between items-center bg-black/5 dark:bg-white/5 rounded-b-3xl">
                                        <div className="flex gap-2 flex-wrap">
                                            {COLORS.map(c => (
                                                <button 
                                                    key={c.id} 
                                                    className={`w-8 h-8 rounded-full border-2 transition-transform ${modalColor === c.value ? 'border-blue-500 scale-110' : 'border-transparent hover:scale-110'}`}
                                                    style={{ backgroundColor: isDarkMode ? c.darkValue : c.value }}
                                                    onClick={() => setModalColor(c.value)}
                                                />
                                            ))}
                                        </div>
                                        <button onClick={saveEditedNote} className="bg-gray-900 dark:bg-blue-600 text-white w-full sm:w-auto px-8 py-2.5 rounded-xl font-bold shadow-md hover:scale-105 transition-transform">
                                            儲存變更
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
