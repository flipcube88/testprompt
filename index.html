<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Keep</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="你的個人 Prompt 與程式碼片段管理工具">
    <link rel="icon" href="https://api.iconify.design/lucide/copy.svg?color=%232563eb" type="image/svg+xml">
    
    <script>
      const manifest = {
        "name": "Prompt Keep", "short_name": "PromptKeep",
        "start_url": ".", "display": "standalone", "background_color": "#f9fafb", "theme_color": "#2563eb",
        "icons": [
          { "src": "https://api.iconify.design/lucide/copy.svg?color=%232563eb&width=192&height=192", "sizes": "192x192", "type": "image/svg+xml" },
          { "src": "https://api.iconify.design/lucide/copy.svg?color=%232563eb&width=512&height=512", "sizes": "512x512", "type": "image/svg+xml", "purpose": "any maskable" }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const manifestURL = URL.createObjectURL(blob);
      const link = document.createElement('link'); link.rel = 'manifest'; link.href = manifestURL; document.head.appendChild(link);
    </script>

    <script>
        if (localStorage.getItem('prompt-keep-theme') === 'dark' || (!('prompt-keep-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        .code-preview-fade::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
            background: linear-gradient(to top, #1f2937, transparent); pointer-events: none;
        }
        .dark .code-preview-fade::after { background: linear-gradient(to top, #111827, transparent); }

        .md-content h1 { font-size: 1.4em; font-weight: 700; margin: 0.5em 0 0.3em; }
        .md-content h2 { font-size: 1.2em; font-weight: 700; margin: 0.5em 0 0.3em; }
        .md-content h3 { font-size: 1.05em; font-weight: 600; margin: 0.4em 0 0.2em; }
        .md-content strong { font-weight: 700; }
        .md-content em { font-style: italic; }
        .md-content del { text-decoration: line-through; opacity: 0.7; }
        .md-content a { color: #2563eb; text-decoration: underline; }
        .dark .md-content a { color: #60a5fa; }
        .md-content ul { list-style: disc; padding-left: 1.4em; margin: 0.3em 0; }
        .md-content ol { list-style: decimal; padding-left: 1.4em; margin: 0.3em 0; }
        .md-content li { margin: 0.15em 0; }
        .md-content blockquote { border-left: 3px solid #94a3b8; padding-left: 0.75em; opacity: 0.8; margin: 0.4em 0; }
        .md-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 0.6em 0; }
        .dark .md-content hr { border-top-color: #374151; }
        .md-content code.inline-code {
            background: rgba(0,0,0,0.08); border-radius: 3px;
            padding: 0.1em 0.35em; font-family: monospace; font-size: 0.88em;
        }
        .dark .md-content code.inline-code { background: rgba(255,255,255,0.12); }

        .tag-pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 8px;
            border-radius: 999px; font-size: 0.72em; font-weight: 600; cursor: pointer;
            border: 1px solid transparent; transition: all 0.15s; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-in { animation: slideUp 0.25s ease forwards; }
        .toast-out { animation: fadeOut 0.3s ease forwards; }

        mark.search-hl { background: #fde68a; border-radius: 2px; padding: 0 1px; }
        .dark mark.search-hl { background: #854d0e; color: #fef9c3; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans antialiased selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyD6s5zYl7VtTxnqcXPkWccGAB7zug1pgi8",
            authDomain: "testprompt-e4212.firebaseapp.com",
            projectId: "testprompt-e4212",
            storageBucket: "testprompt-e4212.appspot.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        const COLORS = [
            { id: 'default', value: '#ffffff', darkValue: '#1f2937' },
            { id: 'red',     value: '#f28b82', darkValue: '#5c2b29' },
            { id: 'orange',  value: '#fbbc04', darkValue: '#614a19' },
            { id: 'yellow',  value: '#fff475', darkValue: '#635d19' },
            { id: 'green',   value: '#ccff90', darkValue: '#345920' },
            { id: 'teal',    value: '#a7ffeb', darkValue: '#16504b' },
            { id: 'blue',    value: '#cbf0f8', darkValue: '#2d555e' },
            { id: 'darkblue',value: '#aecbfa', darkValue: '#1e3a5f' },
            { id: 'purple',  value: '#d7aefb', darkValue: '#42275e' },
            { id: 'pink',    value: '#fdcfe8', darkValue: '#5b2245' },
            { id: 'brown',   value: '#e6c9a8', darkValue: '#442f19' },
            { id: 'gray',    value: '#e8eaed', darkValue: '#3c3f43' },
        ];

        const TAG_COLORS = [
            { bg: 'bg-blue-100 dark:bg-blue-900/50',   text: 'text-blue-700 dark:text-blue-300',   border: 'border-blue-200 dark:border-blue-700' },
            { bg: 'bg-green-100 dark:bg-green-900/50', text: 'text-green-700 dark:text-green-300', border: 'border-green-200 dark:border-green-700' },
            { bg: 'bg-purple-100 dark:bg-purple-900/50',text:'text-purple-700 dark:text-purple-300',border:'border-purple-200 dark:border-purple-700'},
            { bg: 'bg-orange-100 dark:bg-orange-900/50',text:'text-orange-700 dark:text-orange-300',border:'border-orange-200 dark:border-orange-700'},
            { bg: 'bg-pink-100 dark:bg-pink-900/50',   text: 'text-pink-700 dark:text-pink-300',   border: 'border-pink-200 dark:border-pink-700' },
            { bg: 'bg-teal-100 dark:bg-teal-900/50',   text: 'text-teal-700 dark:text-teal-300',   border: 'border-teal-200 dark:border-teal-700' },
        ];

        const hashStr = (s) => s.split('').reduce((a, c) => (a << 5) - a + c.charCodeAt(0), 0);
        const getTagColor = (tag) => TAG_COLORS[Math.abs(hashStr(tag)) % TAG_COLORS.length];

        function useOnClickOutside(ref, handler) {
            useEffect(() => {
                const listener = (e) => { if (!ref.current || ref.current.contains(e.target)) return; handler(e); };
                document.addEventListener("mousedown", listener);
                document.addEventListener("touchstart", listener);
                return () => { document.removeEventListener("mousedown", listener); document.removeEventListener("touchstart", listener); };
            }, [ref, handler]);
        }

        const Icon = React.memo(({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (!containerRef.current || !lucide.icons[name]) return;
                containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                lucide.createIcons({ icons: { [name]: lucide.icons[name] }, nameAttr: 'data-lucide', attrs: { class: className, width: size, height: size } });
                return () => { if (containerRef.current) containerRef.current.innerHTML = ''; };
            }, [name, size, className]);
            return <span ref={containerRef} style={{ display: 'contents' }}></span>;
        });

        const Toast = ({ message, type = 'success', onDone }) => {
            const [out, setOut] = useState(false);
            useEffect(() => {
                const t1 = setTimeout(() => setOut(true), 1800);
                const t2 = setTimeout(() => onDone(), 2100);
                return () => { clearTimeout(t1); clearTimeout(t2); };
            }, []);
            const colors = type === 'success' ? 'bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900' : 'bg-red-600 text-white';
            return (
                <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-xl shadow-xl text-sm font-medium flex items-center gap-2 ${colors} ${out ? 'toast-out' : 'toast-in'}`}>
                    <Icon name={type === 'success' ? 'Check' : 'AlertTriangle'} size={16} />
                    {message}
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-[60] flex items-center justify-center p-4" onClick={onCancel}>
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-sm w-full p-6 border dark:border-gray-700" onClick={e => e.stopPropagation()}>
                        <div className="flex items-center gap-3 mb-4 text-red-600 dark:text-red-400">
                            <Icon name="AlertTriangle" size={24} />
                            <h3 className="text-xl font-bold text-gray-900 dark:text-gray-100">{title}</h3>
                        </div>
                        <p className="text-gray-600 dark:text-gray-300 mb-6">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button onClick={onCancel} className="px-4 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">取消</button>
                            <button onClick={onConfirm} className="px-4 py-2 rounded-lg font-medium bg-red-600 hover:bg-red-700 text-white transition-colors shadow-sm">確認刪除</button>
                        </div>
                    </div>
                </div>
            );
        };

        const renderMarkdownLine = (line, key, searchQuery) => {
            const applyHighlight = (text) => {
                if (!searchQuery || !searchQuery.trim()) return text;
                const escaped = searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const parts = text.split(new RegExp(`(${escaped})`, 'gi'));
                return parts.map((p, idx) => p.toLowerCase() === searchQuery.toLowerCase() ? <mark key={idx} className="search-hl">{p}</mark> : p);
            };
            const rules = [
                { re: /\*\*(.+?)\*\*/, tag: 'strong' }, { re: /__(.+?)__/, tag: 'strong' },
                { re: /\*(.+?)\*/, tag: 'em' }, { re: /_(.+?)_/, tag: 'em' },
                { re: /~~(.+?)~~/, tag: 'del' }, { re: /`([^`]+)`/, tag: 'code' },
                { re: /\[(.+?)\]\((https?:\/\/[^\)]+)\)/, tag: 'a' },
            ];
            const parseInline = (str) => {
                for (const { re, tag } of rules) {
                    const m = re.exec(str);
                    if (!m) continue;
                    const before = str.slice(0, m.index), after = str.slice(m.index + m[0].length), inner = m[1];
                    return [
                        before && <React.Fragment key="b">{applyHighlight(before)}</React.Fragment>,
                        tag === 'strong' && <strong key="m">{parseInline(inner)}</strong>,
                        tag === 'em'     && <em key="m">{parseInline(inner)}</em>,
                        tag === 'del'    && <del key="m">{parseInline(inner)}</del>,
                        tag === 'code'   && <code key="m" className="inline-code">{inner}</code>,
                        tag === 'a'      && <a key="m" href={m[2]} target="_blank" rel="noopener noreferrer">{parseInline(inner)}</a>,
                        after && <React.Fragment key="a">{parseInline(after)}</React.Fragment>,
                    ].filter(Boolean);
                }
                return applyHighlight(str);
            };
            if (/^#{1,3}\s/.test(line)) { const level = line.match(/^(#{1,3})\s/)[1].length; const Tag = `h${level}`; return <Tag key={key}>{parseInline(line.replace(/^#{1,3}\s/, ''))}</Tag>; }
            if (/^[-*]\s/.test(line)) return <li key={key}>{parseInline(line.replace(/^[-*]\s/, ''))}</li>;
            if (/^\d+\.\s/.test(line)) return <li key={key}>{parseInline(line.replace(/^\d+\.\s/, ''))}</li>;
            if (/^>\s/.test(line)) return <blockquote key={key}>{parseInline(line.replace(/^>\s/, ''))}</blockquote>;
            if (/^---+$/.test(line.trim())) return <hr key={key} />;
            if (line.trim() === '') return <br key={key} />;
            return <p key={key} style={{margin:'0.1em 0'}}>{parseInline(line)}</p>;
        };

        const renderMarkdownBlock = (text, searchQuery) => {
            const lines = text.split('\n');
            const result = [];
            let listBuffer = [], listType = null;
            const flushList = () => {
                if (!listBuffer.length) return;
                const Tag = listType === 'ul' ? 'ul' : 'ol';
                result.push(<Tag key={result.length}>{listBuffer}</Tag>);
                listBuffer = []; listType = null;
            };
            lines.forEach((line, i) => {
                const rendered = renderMarkdownLine(line, i, searchQuery);
                if (rendered && rendered.type === 'li') {
                    const newType = /^\d+\./.test(line) ? 'ol' : 'ul';
                    if (listType && listType !== newType) flushList();
                    listType = newType; listBuffer.push(rendered);
                } else { flushList(); result.push(rendered); }
            });
            flushList();
            return result;
        };

        const CodeBlock = React.memo(({ code, language, isPreview }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = useCallback((e) => {
                e.stopPropagation();
                const copy = () => { setCopied(true); setTimeout(() => setCopied(false), 2000); };
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(code).then(copy);
                } else {
                    const ta = document.createElement("textarea"); ta.value = code;
                    ta.style.cssText = "position:fixed;left:-999999px"; document.body.appendChild(ta);
                    ta.focus(); ta.select();
                    try { document.execCommand('copy'); copy(); } catch(e) {}
                    document.body.removeChild(ta);
                }
            }, [code]);
            return (
                <div className="relative bg-gray-800 dark:bg-gray-900 rounded-lg my-3 shadow-inner overflow-hidden cursor-text" onClick={e => e.stopPropagation()}>
                    <div className="flex justify-between items-center bg-gray-900 dark:bg-gray-950 px-3 py-1.5 border-b border-gray-700">
                        <span className="text-xs text-gray-400 font-medium uppercase tracking-wider">{language || 'Prompt / Code'}</span>
                        <button onClick={handleCopy} className="flex items-center gap-1.5 px-2 py-1 text-xs font-medium text-gray-300 hover:text-white hover:bg-gray-700 rounded transition-colors">
                            {copied ? <Icon name="Check" size={14} className="text-green-400" /> : <Icon name="Copy" size={14} />}
                            {copied ? <span className="text-green-400">已複製!</span> : <span>複製</span>}
                        </button>
                    </div>
                    <div className={`p-3 text-sm text-gray-100 font-mono leading-relaxed relative ${isPreview ? 'max-h-[120px] overflow-hidden code-preview-fade' : 'overflow-x-auto'}`}>
                        <pre><code className="whitespace-pre-wrap break-words">{code}</code></pre>
                    </div>
                </div>
            );
        });

        const parseContent = (text, isPreview = false, searchQuery = '') => {
            if (!text) return null;
            const parts = text.split(/```/);
            return parts.map((part, index) => {
                if (index % 2 !== 0) {
                    let codeText = part, language = '';
                    const nl = part.indexOf('\n');
                    if (nl !== -1 && nl < 20) { const fl = part.substring(0, nl).trim(); if (/^[a-zA-Z0-9_+-]+$/.test(fl)) { language = fl; codeText = part.substring(nl + 1); } }
                    return <CodeBlock key={index} code={codeText.trim()} language={language} isPreview={isPreview} />;
                }
                return <div key={index} className="md-content text-gray-800 dark:text-gray-200 leading-relaxed">{renderMarkdownBlock(part, searchQuery)}</div>;
            });
        };

        const extractTags = (note) => {
            const text = `${note.title || ''} ${note.content || ''}`;
            const matches = text.match(/#([a-zA-Z0-9\u4e00-\u9fff_-]+)/g) || [];
            return [...new Set(matches.map(t => t.slice(1).toLowerCase()))];
        };

        const TagPill = ({ tag, active, onClick }) => {
            const { bg, text, border } = getTagColor(tag);
            return (
                <span className={`tag-pill ${bg} ${text} ${border} ${active ? 'ring-2 ring-offset-1 ring-blue-400' : 'hover:opacity-80'}`}
                    onClick={onClick ? (e) => { e.stopPropagation(); onClick(tag); } : undefined}>
                    #{tag}
                </span>
            );
        };

        const NoteCard = React.memo(({ note, isDarkMode, onOpen, onDelete, onTagClick, activeTag, searchQuery }) => {
            const getActiveColor = (hex) => { const c = COLORS.find(c => c.value === hex) || COLORS[0]; return isDarkMode ? c.darkValue : c.value; };
            const bg = getActiveColor(note.color);
            const isDefault = note.color === '#ffffff' && !isDarkMode;
            const tags = useMemo(() => extractTags(note), [note.title, note.content]);
            const parsed = useMemo(() => parseContent(note.content, true, searchQuery), [note.content, searchQuery]);
            return (
                <div className="break-inside-avoid mb-4 border rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-all group relative cursor-pointer dark:border-gray-700"
                    style={{ backgroundColor: bg, borderColor: isDefault ? '#e0e0e0' : (isDarkMode ? '#374151' : 'transparent') }}
                    onClick={() => onOpen(note)}>
                    <div className="p-4 sm:p-5 relative max-h-[600px] overflow-hidden">
                        {note.title && <h3 className="font-bold text-lg mb-2 text-gray-900 dark:text-gray-100">{note.title}</h3>}
                        {tags.length > 0 && <div className="flex flex-wrap gap-1 mb-2">{tags.map(t => <TagPill key={t} tag={t} active={activeTag === t} onClick={onTagClick} />)}</div>}
                        <div className="text-base">{parsed}</div>
                        <div className="absolute bottom-0 left-0 right-0 h-12 pointer-events-none" style={{ background: `linear-gradient(to top, ${bg}, transparent)` }} />
                    </div>
                    <div className="opacity-0 group-hover:opacity-100 absolute top-2 right-2 flex gap-1 transition-opacity">
                        <button className="p-1.5 bg-white/80 dark:bg-gray-800/80 backdrop-blur rounded-full hover:bg-red-50 dark:hover:bg-red-900/30 text-gray-600 dark:text-gray-400 hover:text-red-500 shadow-sm"
                            onClick={(e) => { e.stopPropagation(); onDelete(note.id, e); }}>
                            <Icon name="Trash2" size={16} />
                        </button>
                    </div>
                </div>
            );
        });

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(() => document.documentElement.classList.contains('dark'));
            const [notes, setNotes] = useState(() => {
                try { const saved = localStorage.getItem('prompt-keep-notes-local'); if (saved) return JSON.parse(saved); } catch(e) {}
                return [{ id: '1', title: '歡迎使用 ✨', content: '登入 Google 帳號後，筆記自動雲端同步！\n\n**粗體** / *斜體* / ~~刪除線~~ 都支援喇 🎉\n\n用 `#tag` 就可以加標籤分類，例如 #chatgpt #工作\n\n```javascript\nconsole.log("Markdown + Code 都齊咗！");\n```', color: '#ccff90', timestamp: Date.now() }];
            });
            const [user, setUser] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);
            const [authChecking, setAuthChecking] = useState(true);
            const [isComposing, setIsComposing] = useState(false);
            const [newTitle, setNewTitle] = useState('');
            const [newContent, setNewContent] = useState('');
            const [newColor, setNewColor] = useState(COLORS[0].value);
            const [showComposePalette, setShowComposePalette] = useState(false);
            const [activeNote, setActiveNote] = useState(null);
            const [isModalEditing, setIsModalEditing] = useState(false);
            const [unsavedWarning, setUnsavedWarning] = useState(false);
            const originalNote = useRef(null);
            const [noteToDelete, setNoteToDelete] = useState(null);
            const [showLogoutConfirm, setShowLogoutConfirm] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [activeTag, setActiveTag] = useState(null);
            const [toast, setToast] = useState(null);
            const showToast = (msg, type = 'success') => setToast({ msg, type, key: Date.now() });
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);
            const composeRef = useRef(null);
            const textareaRef = useRef(null);
            const composePaletteRef = useRef(null);

            const handleLogin = () => auth.signInWithRedirect(googleProvider);
            const handleLogout = () => { auth.signOut(); setNotes([]); setShowLogoutConfirm(false); showToast('已登出'); };

            useOnClickOutside(composeRef, () => { if (isComposing) saveNewNote(); });

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setDeferredPrompt(e); setIsInstallable(true); });
            }, []);

            useEffect(() => {
                auth.getRedirectResult().catch((err) => { console.error("Redirect error:", err); showToast('登入發生錯誤：' + err.message, 'error'); });
                const unsubAuth = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser); setAuthChecking(false);
                    if (currentUser) {
                        setIsSyncing(true);
                        const unsubDb = db.collection('users').doc(currentUser.uid).collection('notes')
                            .onSnapshot((snap) => {
                                const fetched = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                                fetched.sort((a, b) => b.timestamp - a.timestamp);
                                setNotes(fetched); setIsSyncing(false);
                            }, (err) => { console.error(err); setIsSyncing(false); });
                        currentUser._unsubDb = unsubDb;
                    } else {
                        try { const saved = localStorage.getItem('prompt-keep-notes-local'); if (saved) setNotes(JSON.parse(saved)); } catch(e) {}
                    }
                });
                return () => { unsubAuth(); if (auth.currentUser && auth.currentUser._unsubDb) auth.currentUser._unsubDb(); };
            }, []);

            useEffect(() => { if (!user && !authChecking) localStorage.setItem('prompt-keep-notes-local', JSON.stringify(notes)); }, [notes, user, authChecking]);

            const toggleDarkMode = () => { const next = !isDarkMode; document.documentElement.classList.toggle('dark', next); localStorage.setItem('prompt-keep-theme', next ? 'dark' : 'light'); setIsDarkMode(next); };
            const getActiveColor = useCallback((hex) => { const c = COLORS.find(c => c.value === hex) || COLORS[0]; return isDarkMode ? c.darkValue : c.value; }, [isDarkMode]);

            const saveNewNote = () => {
                if (!newTitle.trim() && !newContent.trim()) { setIsComposing(false); setShowComposePalette(false); return; }
                const newNote = { title: newTitle.trim(), content: newContent.trim(), color: newColor, timestamp: Date.now() };
                if (user) { db.collection('users').doc(user.uid).collection('notes').doc(Date.now().toString()).set(newNote); }
                else { setNotes(prev => [{ id: Date.now().toString(), ...newNote }, ...prev]); }
                setNewTitle(''); setNewContent(''); setNewColor(COLORS[0].value);
                setIsComposing(false); setShowComposePalette(false);
                if (textareaRef.current) textareaRef.current.style.height = '100px';
                showToast('筆記已儲存 ✓');
            };

            const saveEditedNote = () => {
                if (!activeNote) return;
                const { id, ...data } = activeNote; data.timestamp = Date.now();
                if (user) { db.collection('users').doc(user.uid).collection('notes').doc(id).set(data); }
                else { setNotes(prev => prev.map(n => n.id === id ? { id, ...data } : n)); }
                originalNote.current = null; setIsModalEditing(false); showToast('變更已儲存 ✓');
            };

            const handleCloseModal = () => {
                if (isModalEditing && originalNote.current) {
                    const changed = activeNote.title !== originalNote.current.title || activeNote.content !== originalNote.current.content;
                    if (changed) { setUnsavedWarning(true); return; }
                }
                setActiveNote(null); setIsModalEditing(false); originalNote.current = null;
            };

            const handleStartEdit = () => { originalNote.current = { ...activeNote }; setIsModalEditing(true); };
            const confirmDiscardChanges = () => { setUnsavedWarning(false); setActiveNote(null); setIsModalEditing(false); originalNote.current = null; };
            const handleInstall = async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') setIsInstallable(false); setDeferredPrompt(null); };
            const handleTagClick = (tag) => setActiveTag(prev => prev === tag ? null : tag);

            const allTags = useMemo(() => { const s = new Set(); notes.forEach(n => extractTags(n).forEach(t => s.add(t))); return [...s].sort(); }, [notes]);
            const filteredNotes = useMemo(() => {
                let r = notes;
                if (activeTag) r = r.filter(n => extractTags(n).includes(activeTag));
                if (searchQuery.trim()) { const q = searchQuery.trim().toLowerCase(); r = r.filter(n => (n.title||'').toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q)); }
                return r;
            }, [notes, activeTag, searchQuery]);

            return (
                <div className="min-h-screen pb-20 transition-colors duration-200">
                    <header className="bg-white dark:bg-gray-800 p-4 shadow-sm flex items-center justify-between sticky top-0 z-10 transition-colors duration-200 dark:border-b dark:border-gray-700">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 dark:bg-blue-500 p-2 rounded-lg"><Icon name="Copy" size={24} className="text-white" /></div>
                            <h1 className="text-xl font-bold text-gray-700 dark:text-gray-200 tracking-wide hidden sm:block">Prompt Keep</h1>
                        </div>
                        <div className="flex-1 max-w-xs mx-3 relative">
                            <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><Icon name="Search" size={15} /></span>
                            <input type="text" placeholder="搜尋筆記..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                                className="w-full pl-8 pr-3 py-1.5 rounded-full border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-sm text-gray-700 dark:text-gray-200 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400 transition-all" />
                            {searchQuery && <button className="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" onClick={() => setSearchQuery('')}><Icon name="X" size={14} /></button>}
                        </div>
                        <div className="flex items-center gap-2 sm:gap-3">
                            <div className="text-xs sm:text-sm text-gray-500 dark:text-gray-400 font-medium flex items-center gap-1.5 mr-1">
                                {!authChecking && user
                                    ? isSyncing ? <span className="text-blue-500 animate-pulse flex items-center gap-1"><Icon name="Cloud" size={16}/><span className="hidden sm:inline">同步中</span></span>
                                               : <span className="text-green-600 dark:text-green-400 flex items-center gap-1"><Icon name="Cloud" size={16}/><span className="hidden sm:inline">已同步</span></span>
                                    : <span className="text-orange-500 flex items-center gap-1"><Icon name="HardDrive" size={16}/><span className="hidden sm:inline">本機儲存</span></span>}
                            </div>
                            {isInstallable && (
                                <button onClick={handleInstall} className="flex items-center gap-2 px-3 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full font-semibold text-sm border border-blue-200 dark:border-blue-800 transition-colors">
                                    <Icon name="Download" size={16} /><span className="hidden sm:inline">安裝 App</span>
                                </button>
                            )}
                            <button onClick={toggleDarkMode} className="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full transition-colors">
                                {isDarkMode ? <Icon name="Sun" size={18} /> : <Icon name="Moon" size={18} />}
                            </button>
                            {!authChecking && (user ? (
                                <button onClick={() => setShowLogoutConfirm(true)} className="flex items-center gap-2 px-3 py-1.5 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full font-medium text-sm transition-colors border dark:border-gray-600">
                                    <img src={user.photoURL} alt="Avatar" className="w-6 h-6 rounded-full" onError={e => e.target.style.display='none'} />
                                    <span className="text-gray-700 dark:text-gray-200 hidden sm:inline">{user.displayName}</span>
                                </button>
                            ) : (
                                <button onClick={handleLogin} className="flex items-center gap-2 px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-medium text-sm transition-colors shadow-sm">
                                    <Icon name="LogIn" size={16} /><span className="hidden sm:inline">Google 登入</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
                        {allTags.length > 0 && (
                            <div className="flex flex-wrap gap-2 mb-6 items-center">
                                <span className="text-xs text-gray-400 dark:text-gray-500 font-medium mr-1">標籤篩選：</span>
                                {allTags.map(tag => <TagPill key={tag} tag={tag} active={activeTag === tag} onClick={handleTagClick} />)}
                                {activeTag && <button className="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 ml-1 underline" onClick={() => setActiveTag(null)}>清除篩選</button>}
                            </div>
                        )}

                        <div className="max-w-2xl mx-auto mb-10 relative" ref={composeRef}>
                            <div className={`rounded-xl transition-all duration-300 ${isComposing ? 'shadow-lg border border-gray-200 dark:border-gray-700' : 'shadow shadow-gray-200 dark:shadow-none hover:shadow-md cursor-text dark:border dark:border-gray-700'}`}
                                style={{ backgroundColor: getActiveColor(newColor) }}>
                                {!isComposing ? (
                                    <div className="p-4 flex items-center text-gray-500 dark:text-gray-400 font-medium"
                                        onClick={() => { setIsComposing(true); setTimeout(() => textareaRef.current?.focus(), 50); }}>
                                        <span>新增一則包含 Prompt 的記事...</span>
                                        <span className="ml-auto text-xs bg-black/5 dark:bg-white/10 px-2 py-1 rounded">支援 ``` 及 Markdown</span>
                                    </div>
                                ) : (
                                    <div className="flex flex-col p-4">
                                        <input type="text" placeholder="標題" className="w-full bg-transparent outline-none font-bold text-lg mb-3 dark:placeholder-gray-400 dark:text-gray-100" value={newTitle} onChange={e => setNewTitle(e.target.value)} />
                                        <textarea ref={textareaRef} placeholder={'使用 ``` 包覆程式碼，**粗體**，#tag 加標籤...'}
                                            className="w-full bg-transparent outline-none resize-none min-h-[100px] leading-relaxed dark:placeholder-gray-400 dark:text-gray-100"
                                            value={newContent} onChange={e => { setNewContent(e.target.value); e.target.style.height = 'inherit'; e.target.style.height = e.target.scrollHeight + 'px'; }} />
                                        <div className="flex justify-between items-center mt-4 pt-2">
                                            <div className="relative" ref={composePaletteRef}>
                                                <button className={`p-2 rounded-full transition-colors ${showComposePalette ? 'bg-black/10 dark:bg-white/10' : 'hover:bg-black/10 dark:hover:bg-white/10'} text-gray-700 dark:text-gray-300`}
                                                    onClick={() => setShowComposePalette(!showComposePalette)}><Icon name="Palette" size={18} /></button>
                                                {showComposePalette && (
                                                    <div className="absolute top-12 left-0 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-xl rounded-lg p-2 flex flex-wrap w-48 gap-1 z-20">
                                                        {COLORS.map(c => <button key={c.id} className={`w-7 h-7 rounded-full border-2 ${newColor === c.value ? 'border-blue-500' : 'border-transparent dark:border-gray-600'}`} style={{ backgroundColor: isDarkMode ? c.darkValue : c.value }} onClick={() => { setNewColor(c.value); setShowComposePalette(false); }} />)}
                                                    </div>
                                                )}
                                            </div>
                                            <button className="px-5 py-1.5 font-semibold text-sm hover:bg-black/10 dark:hover:bg-white/10 rounded-md text-gray-800 dark:text-gray-200 transition-colors" onClick={saveNewNote}>關閉</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {filteredNotes.length === 0 ? (
                            <div className="text-center text-gray-400 dark:text-gray-500 py-20">
                                <Icon name="SearchX" size={40} className="mx-auto mb-3 opacity-40" />
                                <p className="text-lg font-medium">找唔到相關筆記</p>
                                <p className="text-sm mt-1">試下換個關鍵字或清除篩選</p>
                            </div>
                        ) : (
                            <div className="columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-4">
                                {filteredNotes.map(note => (
                                    <NoteCard key={note.id} note={note} isDarkMode={isDarkMode}
                                        onOpen={(n) => { setActiveNote({ ...n }); setIsModalEditing(false); originalNote.current = null; }}
                                        onDelete={(id, e) => { e.stopPropagation(); setNoteToDelete(id); }}
                                        onTagClick={handleTagClick} activeTag={activeTag} searchQuery={searchQuery} />
                                ))}
                            </div>
                        )}
                    </main>

                    {activeNote && (
                        <div className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={handleCloseModal}>
                            <div className="w-full max-w-2xl rounded-xl shadow-2xl flex flex-col max-h-[90vh] relative border dark:border-gray-700 transition-colors duration-200"
                                style={{ backgroundColor: getActiveColor(activeNote.color) }} onClick={e => e.stopPropagation()}>
                                <button className="absolute top-4 right-4 p-2 bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 rounded-full z-10 text-gray-700 dark:text-gray-300 transition-colors" onClick={handleCloseModal}><Icon name="X" size={20} /></button>
                                <div className="p-6 flex-1 overflow-y-auto pt-14">
                                    {isModalEditing ? (
                                        <>
                                            <input type="text" className="w-full bg-transparent outline-none font-bold text-2xl mb-4 border-b border-black/10 dark:border-white/10 pb-2 text-gray-900 dark:text-gray-100"
                                                value={activeNote.title} onChange={e => setActiveNote({ ...activeNote, title: e.target.value })} />
                                            <textarea className="w-full bg-transparent outline-none resize-none min-h-[400px] leading-relaxed text-gray-800 dark:text-gray-200"
                                                value={activeNote.content} onChange={e => setActiveNote({ ...activeNote, content: e.target.value })} />
                                            <p className="text-xs text-gray-400 mt-2">支援 **粗體**、*斜體*、`code`、# 標題、#tag 標籤</p>
                                        </>
                                    ) : (
                                        <>
                                            {activeNote.title && <h2 className="font-bold text-2xl mb-3 text-gray-900 dark:text-gray-100">{activeNote.title}</h2>}
                                            {extractTags(activeNote).length > 0 && (
                                                <div className="flex flex-wrap gap-1.5 mb-4">
                                                    {extractTags(activeNote).map(t => <TagPill key={t} tag={t} active={activeTag === t} onClick={handleTagClick} />)}
                                                </div>
                                            )}
                                            <div className="text-lg">{parseContent(activeNote.content, false, searchQuery)}</div>
                                        </>
                                    )}
                                </div>
                                <div className="p-4 border-t border-black/5 dark:border-white/5 flex justify-between items-center bg-black/5 dark:bg-white/5 rounded-b-xl">
                                    <div className="relative group/palette">
                                        <button className="p-2 rounded-full hover:bg-white/50 dark:hover:bg-white/10 text-gray-700 dark:text-gray-300 transition-colors"><Icon name="Palette" size={20} /></button>
                                        <div className="absolute bottom-full left-0 mb-2 hidden group-hover/palette:flex bg-white dark:bg-gray-800 shadow-xl rounded-lg p-2 w-48 flex-wrap gap-1 z-20 border dark:border-gray-700">
                                            {COLORS.map(c => <button key={c.id} className={`w-7 h-7 rounded-full border-2 ${activeNote.color === c.value ? 'border-blue-500' : 'border-transparent dark:border-gray-600'}`} style={{ backgroundColor: isDarkMode ? c.darkValue : c.value }} onClick={() => setActiveNote({ ...activeNote, color: c.value })} />)}
                                        </div>
                                    </div>
                                    <div className="flex gap-3 items-center">
                                        {isModalEditing && (
                                            <button className="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-300 hover:bg-black/10 dark:hover:bg-white/10 rounded-lg transition-colors"
                                                onClick={() => { setActiveNote({ ...originalNote.current }); setIsModalEditing(false); }}>取消</button>
                                        )}
                                        {!isModalEditing ? (
                                            <button className="flex items-center gap-2 px-6 py-2 bg-white/50 dark:bg-white/10 font-medium rounded-lg hover:bg-white/80 dark:hover:bg-white/20 border border-black/10 dark:border-white/10 text-gray-800 dark:text-gray-200 transition-colors" onClick={handleStartEdit}>
                                                <Icon name="Edit3" size={18} /> 編輯筆記
                                            </button>
                                        ) : (
                                            <button className="px-6 py-2 bg-gray-900 dark:bg-blue-600 text-white font-medium rounded-lg hover:bg-gray-800 dark:hover:bg-blue-500 transition-colors shadow-md" onClick={saveEditedNote}>儲存變更</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <ConfirmModal isOpen={!!noteToDelete} title="刪除筆記" message="確定要刪除這則筆記嗎？刪除後將無法還原。"
                        onConfirm={() => {
                            if (user) { db.collection('users').doc(user.uid).collection('notes').doc(noteToDelete).delete(); }
                            else { setNotes(prev => prev.filter(n => n.id !== noteToDelete)); }
                            if (activeNote?.id === noteToDelete) setActiveNote(null);
                            setNoteToDelete(null); showToast('筆記已刪除');
                        }}
                        onCancel={() => setNoteToDelete(null)} />

                    {showLogoutConfirm && (
                        <div className="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-[60] flex items-center justify-center p-4" onClick={() => setShowLogoutConfirm(false)}>
                            <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-sm w-full p-6 border dark:border-gray-700" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-4 text-gray-700 dark:text-gray-300"><Icon name="LogOut" size={24} /><h3 className="text-xl font-bold text-gray-900 dark:text-gray-100">登出帳號</h3></div>
                                <p className="text-gray-600 dark:text-gray-300 mb-6">確定要登出 Google 帳號嗎？</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowLogoutConfirm(false)} className="px-4 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">取消</button>
                                    <button onClick={handleLogout} className="px-4 py-2 rounded-lg font-medium bg-gray-800 dark:bg-gray-200 hover:bg-gray-900 dark:hover:bg-white text-white dark:text-gray-900 transition-colors shadow-sm">確認登出</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {unsavedWarning && (
                        <div className="fixed inset-0 bg-black/50 dark:bg-black/70 backdrop-blur-sm z-[70] flex items-center justify-center p-4" onClick={() => setUnsavedWarning(false)}>
                            <div className="bg-white dark:bg-gray-800 rounded-xl shadow-2xl max-w-sm w-full p-6 border dark:border-gray-700" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-4 text-yellow-600 dark:text-yellow-400"><Icon name="AlertTriangle" size={24} /><h3 className="text-xl font-bold text-gray-900 dark:text-gray-100">未儲存的變更</h3></div>
                                <p className="text-gray-600 dark:text-gray-300 mb-6">你有未儲存嘅更改，確定要放棄並離開嗎？</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setUnsavedWarning(false)} className="px-4 py-2 rounded-lg font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 transition-colors">繼續編輯</button>
                                    <button onClick={confirmDiscardChanges} className="px-4 py-2 rounded-lg font-medium bg-yellow-500 hover:bg-yellow-600 text-white transition-colors shadow-sm">放棄更改</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {toast && <Toast key={toast.key} message={toast.msg} type={toast.type} onDone={() => setToast(null)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW 註冊失敗', err));
            });
        }
    </script>
</body>
</html>
